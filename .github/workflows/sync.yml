name: Vacation Rental Sync

on:
  schedule:
    - cron: "0 */2 * * *"   # Every 2 hours
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run sync
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          LODGIFY_API_KEY: ${{ secrets.LODGIFY_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json
          SYNC_LOOKAHEAD_DAYS: "90"
          SYNC_LOOKBACK_DAYS: "1"
          EXTENSION_WEBHOOK_URL: ${{ secrets.EXTENSION_WEBHOOK_URL }}
          OWNER_PHONE: ${{ secrets.OWNER_PHONE }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
        run: python main.py
